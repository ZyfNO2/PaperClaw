name: Consolidate open PR branches

on:
  push:
    branches:
      - feat/consolidated-v0.11-v0.15

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/consolidated-v0.11-v0.15

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin \
            agent/manual-provider-and-gate-control \
            agent/manual-provider-model-selection

      - name: Merge final desktop and provider chain
        shell: bash
        run: |
          set -euo pipefail
          git merge --no-commit --no-ff origin/agent/manual-provider-and-gate-control || true

          conflicts="$(git diff --name-only --diff-filter=U)"
          for path in $conflicts; do
            case "$path" in
              pyproject.toml|src/paperclaw/entrypoint.py)
                ;;
              *)
                git checkout --theirs -- "$path"
                git add "$path"
                ;;
            esac
          done

          cat > pyproject.toml <<'EOF'
          [build-system]
          requires = ["setuptools>=68", "wheel"]
          build-backend = "setuptools.build_meta"

          [project]
          name = "paperclaw"
          version = "0.0.1"
          description = "A lightweight agent runtime for coding and research workflows"
          requires-python = ">=3.12"
          dependencies = []

          [project.scripts]
          paperclaw = "paperclaw.entrypoint:main"
          paperclaw-gui = "paperclaw.desktop.bootstrap:main"
          paperclaw-api = "paperclaw.service.entrypoint:main"
          paperclaw-research-eval = "paperclaw.research_eval.cli:main"

          [project.optional-dependencies]
          tui = [
              "textual>=1.0,<8",
          ]
          gui = [
              "pywebview>=5,<7",
          ]
          service = [
              "fastapi>=0.115,<1",
              "uvicorn>=0.34,<1",
          ]
          build = [
              "pyinstaller>=6,<7",
              "pywebview>=5,<7",
          ]
          dev = [
              "pytest>=8.3",
              "pytest-reportlog>=0.4,<1",
              "hypothesis>=6.100,<7",
              "ruff>=0.7",
              "textual>=1.0,<8",
              "playwright>=1.50,<2",
              "fastapi>=0.115,<1",
              "uvicorn>=0.34,<1",
              "httpx>=0.28,<1",
          ]

          [tool.setuptools.packages.find]
          where = ["src"]
          include = ["paperclaw*", "pocketflow*"]

          [tool.setuptools.package-data]
          "paperclaw.desktop" = ["static/*.html", "static/*.css", "static/*.js"]

          [tool.pytest.ini_options]
          testpaths = ["tests"]
          pythonpath = ["src"]
          markers = [
              "real_llm: tests that call a live LLM provider (slow, costly, non-deterministic)",
          ]

          [tool.ruff]
          target-version = "py312"
          extend-exclude = ["src/pocketflow"]

          [tool.ruff.lint]
          select = ["E9", "F63", "F7", "F82"]
          EOF

          cat > src/paperclaw/entrypoint.py <<'EOF'
          """Installed console entry point with optional desktop and service shims."""

          from __future__ import annotations

          import sys


          def main(argv: list[str] | None = None) -> int:
              resolved = list(sys.argv[1:] if argv is None else argv)
              if resolved and resolved[0] == "gui":
                  from paperclaw.desktop.bootstrap import main as desktop_main

                  return desktop_main(resolved[1:])
              if resolved and resolved[0] == "api":
                  from paperclaw.service.entrypoint import main as service_main

                  return service_main(resolved[1:])
              if resolved and resolved[0] == "research-eval":
                  from paperclaw.research_eval.cli import main as research_eval_main

                  return research_eval_main(resolved[1:])

              from paperclaw.cli import main as legacy_main

              return legacy_main(resolved)


          if __name__ == "__main__":
              raise SystemExit(main())
          EOF

          sed -i 's/^          //' pyproject.toml src/paperclaw/entrypoint.py
          git add pyproject.toml src/paperclaw/entrypoint.py

          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ -n "$unresolved" ]; then
            echo "Unresolved conflicts:"
            echo "$unresolved"
            exit 1
          fi

          git commit -m "merge: consolidate desktop/provider and backend chains"

      - name: Record superseded alternative provider branch
        run: |
          git merge -s ours --no-ff origin/agent/manual-provider-model-selection \
            -m "merge: record superseded manual provider implementation"

      - name: Remove one-shot workflow and push
        run: |
          git rm .github/workflows/consolidate-open-prs.yml
          git commit -m "chore: remove one-shot consolidation workflow"
          git push origin HEAD:feat/consolidated-v0.11-v0.15

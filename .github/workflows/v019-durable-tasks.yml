name: v0.19 Durable background tasks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  durable-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Run focused task runtime tests
        run: |
          mkdir -p tmp
          python -m pytest -q \
            tests/unit/tasks \
            tests/integration/tasks \
            --report-log=tmp/v019-task-report.jsonl
      - name: Write architecture evidence
        if: always()
        run: |
          cat > tmp/v019-task-summary.md <<'EOF'
          # v0.19 Durable Background Task Runtime

          SQLite is the fact store. In-memory asyncio workers are disposable.
          The gate covers idempotent create, DAG transitions, bounded concurrency,
          Provider semaphore, cancellation, lease recovery, unknown outcomes,
          monotonic events, HTTP task APIs, and output retrieval.
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v019-durable-tasks-${{ github.run_id }}
          path: |
            tmp/v019-task-report.jsonl
            tmp/v019-task-summary.md
          retention-days: 30

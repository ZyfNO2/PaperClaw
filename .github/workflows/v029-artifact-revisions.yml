name: v0.29 Artifact Revisions

on:
  pull_request:
    branches:
      - feat/v0.28-project-knowledge-runtime
      - main
    paths:
      - "src/paperclaw/artifacts/**"
      - "src/paperclaw/product_cli.py"
      - "src/paperclaw/entrypoint.py"
      - "tests/unit/artifacts/**"
      - ".github/workflows/v029-artifact-revisions.yml"
      - "Plan/PaperClaw_v0.29_Artifact_Revisions.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run artifact acceptance
        run: python -m pytest -q tests/unit/artifacts tests/unit/test_product_cli.py
      - name: Run v0.28 project runtime regression
        run: >-
          python -m pytest -q
          tests/unit/projects/test_project_knowledge_runtime.py
          tests/unit/retrieval/test_hybrid_retriever.py
          tests/unit/memory/test_project_scoped_memory.py
      - name: Run correctness lint
        run: >-
          python -m ruff check
          src/paperclaw/artifacts
          src/paperclaw/product_cli.py
          src/paperclaw/entrypoint.py
          tests/unit/artifacts
          --select E9,F63,F7,F82

  full-windows-regression:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      TEMP: ${{ github.workspace }}\tmp\pytest_temp
      TMP: ${{ github.workspace }}\tmp\pytest_temp
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Prepare temp dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tmp\pytest_temp | Out-Null
          New-Item -ItemType Directory -Force -Path tmp\pytest | Out-Null
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-reportlog
      - name: Run full non-live pytest regression
        shell: pwsh
        run: |
          python -m pytest `
            --basetemp=tmp/pytest `
            --report-log=tmp/v029-pytest-report.jsonl `
            -q `
            -m "not real_llm"
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v029-full-regression-${{ github.run_id }}
          path: tmp/v029-pytest-report.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run repository correctness lint
        run: python -m ruff check src/paperclaw tests --select E9,F63,F7,F82 --ignore F821

name: Context and long memory acceptance

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: context-memory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-native-workspace-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v0.17-context-long-memory
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Apply source and regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          app_path = Path("src/paperclaw/desktop/app.py")
          app_text = app_path.read_text(encoding="utf-8")
          start = app_text.index("    def select_workspace(self) -> dict[str, object]:\n")
          end = app_text.index("    def open_in_browser", start)
          replacement = '''    def select_workspace(self) -> dict[str, object]:
              try:
                  import webview
              except ImportError:
                  return DesktopPublicError(
                      "native_window_required",
                      "Workspace selection requires an active PaperClaw Desktop window.",
                  ).to_public_dict()

              window = _resolve_native_window(webview, self._window)
              if window is None:
                  return DesktopPublicError(
                      "native_window_required",
                      "Workspace selection requires an active PaperClaw Desktop window.",
                  ).to_public_dict()
              self._window = window
              try:
                  _prepare_native_window(window)
                  dialog_type = _folder_dialog_type(webview)
                  selected = window.create_file_dialog(dialog_type)
              except Exception:
                  return DesktopPublicError(
                      "runtime_error",
                      "Workspace picker could not be opened.",
                  ).to_public_dict()
              if not selected:
                  return {"ok": True, "workspace": None}
              try:
                  workspace = Path(selected[0]).expanduser().resolve(strict=True)
              except (IndexError, OSError, RuntimeError, TypeError, ValueError):
                  return DesktopPublicError(
                      "workspace_not_found",
                      "Selected workspace could not be opened.",
                  ).to_public_dict()
              if not workspace.is_dir():
                  return DesktopPublicError(
                      "workspace_not_found",
                      "Selected workspace is not a directory.",
                  ).to_public_dict()
              return {"ok": True, "workspace": str(workspace)}

'''
          app_text = app_text[:start] + replacement + app_text[end:]

          helper_marker = "def _folder_dialog_type(webview_module: Any) -> Any:\n"
          helper_index = app_text.index(helper_marker)
          helper = '''def _resolve_native_window(
              webview_module: Any,
              bound_window: Any | None,
          ) -> Any | None:
              """Resolve the real pywebview window for native-only operations."""

              if bound_window is not None:
                  return bound_window

              active_window = getattr(webview_module, "active_window", None)
              if callable(active_window):
                  try:
                      candidate = active_window()
                  except Exception:
                      candidate = None
                  if candidate is not None:
                      return candidate

              windows = getattr(webview_module, "windows", ())
              try:
                  return windows[0] if windows else None
              except (IndexError, TypeError):
                  return None


          def _prepare_native_window(window: Any) -> None:
              """Make a hidden or minimized native host visible before opening a dialog."""

              for operation_name in ("show", "restore"):
                  operation = getattr(window, operation_name, None)
                  if not callable(operation):
                      continue
                  try:
                      operation()
                  except Exception:
                      # Dialog creation remains authoritative; activation is best-effort.
                      continue


          '''
          app_text = app_text[:helper_index] + helper + app_text[helper_index:]
          app_path.write_text(app_text, encoding="utf-8")

          test_path = Path("tests/unit/desktop/test_app.py")
          test_text = test_path.read_text(encoding="utf-8")
          fake_start = test_text.index("class FakeWindow:\n")
          fake_end = test_text.index("def _set_provider_env", fake_start)
          fake_replacement = '''class FakeWindow:
              def __init__(self, result) -> None:
                  self.result = result
                  self.calls = []

              def show(self):
                  self.calls.append("show")

              def restore(self):
                  self.calls.append("restore")

              def create_file_dialog(self, dialog_type):
                  assert dialog_type == "folder"
                  self.calls.append("dialog")
                  return self.result


          '''
          test_text = test_text[:fake_start] + fake_replacement + test_text[fake_end:]

          picker_start = test_text.index(
              "def test_desktop_api_exposes_controller_operations_and_workspace_picker(\n"
          )
          picker_end = test_text.index(
              "def test_poll_events_fans_out_to_desktop_and_browser_clients() -> None:\n",
              picker_start,
          )
          picker_replacement = '''def test_desktop_api_exposes_controller_operations_and_workspace_picker(
              tmp_path, monkeypatch
          ) -> None:
              _set_provider_env(monkeypatch)
              api = app.DesktopAPI(FakeController())
              assert api.cancel_run() == {"ok": True, "accepted": True}
              assert api.poll_events(7) == {"ok": True, "items": [], "dropped_count": 0}
              assert api.get_state()["state"]["status"] == "idle"

              fake_webview = SimpleNamespace(FOLDER_DIALOG="folder")
              monkeypatch.setitem(sys.modules, "webview", fake_webview)
              fake_window = FakeWindow((str(tmp_path),))
              api.bind_window(fake_window)

              assert api.select_workspace() == {
                  "ok": True,
                  "workspace": str(tmp_path.resolve()),
              }
              assert fake_window.calls == ["show", "restore", "dialog"]


          def test_workspace_picker_recovers_existing_native_window(
              tmp_path, monkeypatch
          ) -> None:
              api = app.DesktopAPI(FakeController())
              fake_window = FakeWindow((str(tmp_path),))
              fake_webview = SimpleNamespace(
                  FileDialog=SimpleNamespace(FOLDER="folder"),
                  active_window=lambda: None,
                  windows=[fake_window],
              )
              monkeypatch.setitem(sys.modules, "webview", fake_webview)

              assert api.select_workspace() == {
                  "ok": True,
                  "workspace": str(tmp_path.resolve()),
              }
              assert fake_window.calls == ["show", "restore", "dialog"]


          def test_workspace_picker_requires_a_native_window(monkeypatch) -> None:
              api = app.DesktopAPI(FakeController())
              fake_webview = SimpleNamespace(
                  FileDialog=SimpleNamespace(FOLDER="folder"),
                  active_window=lambda: None,
                  windows=[],
              )
              monkeypatch.setitem(sys.modules, "webview", fake_webview)

              response = api.select_workspace()

              assert response["ok"] is False
              assert response["error_code"] == "native_window_required"
              assert "active PaperClaw Desktop window" in response["error_message"]


          '''
          test_text = test_text[:picker_start] + picker_replacement + test_text[picker_end:]
          test_path.write_text(test_text, encoding="utf-8")

          revalidation = Path(
              "artifacts/v0_17_acceptance/DESKTOP_WORKSPACE_PICKER_REVALIDATION.md"
          )
          revalidation.write_text(
              '''# Native Desktop Workspace Picker Revalidation

          ## Status

          `PENDING REAL NATIVE DESKTOP TEST`

          ## Reported gap

          The original v0.17 acceptance run exercised the real LLM and protected browser interface, but did not exercise the packaged/native pywebview workspace selection path. `select_workspace()` ultimately requires a live native pywebview `Window`.

          ## Implemented correction

          - use the bound native window when available;
          - recover from `webview.active_window()` or `webview.windows[0]` when binding is absent or stale;
          - show and restore the native host before opening the folder dialog;
          - return `native_window_required` when no native window exists;
          - preserve pywebview 5 and 6 folder-dialog compatibility.

          ## Automated evidence

          Focused tests cover the bound-window path, window-registry recovery, cancellation, and the typed no-window failure. These tests use fakes and are not a real native GUI acceptance result.

          ## Required Windows acceptance

          ```powershell
          python -m pip install -e ".[gui,dev]"
          python -m pytest -q tests/unit/desktop/test_app.py tests/unit/desktop/test_static_assets.py
          paperclaw gui
          ```

          1. In the native window, select a real workspace and confirm the dialog is visible in front.
          2. Cancel once and confirm the previous workspace remains selected with no public error.
          3. Select a workspace containing a valid `.env` and complete one real-LLM run.
          4. Open protected browser mode and trigger workspace selection; confirm the native PaperClaw window is restored and the dialog is visible.

          Pass requires no hidden dialog, frozen UI, `native_window_required`, or `runtime_error` while the native app is running.
          ''',
              encoding="utf-8",
          )

          evidence_path = Path("artifacts/v0_17_acceptance/ACCEPTANCE_EVIDENCE.md")
          evidence = evidence_path.read_text(encoding="utf-8")
          evidence = evidence.replace(
              "| 1 | Desktop First-Run Provider Config | ✅ PASS | Manual verification with screenshots |",
              "| 1 | Desktop First-Run Provider Config | ⏳ PENDING | Native pywebview workspace picker revalidation required |",
          )
          evidence = evidence.replace(
              "**ACCEPT** — All automated gates pass, all manual scenarios pass, no open Critical or High issue.",
              "**HOLD** — Native Desktop workspace selection requires revalidation after the documented fix.",
          )
          evidence_path.write_text(evidence, encoding="utf-8")

          report_path = Path("artifacts/v0_17_acceptance/RELEASE_ACCEPTANCE_REPORT.md")
          report = report_path.read_text(encoding="utf-8")
          notice = (
              "> [!IMPORTANT]\n"
              "> Native Desktop revalidation notice (2026-07-18): the original operator run "
              "covered the real LLM and protected browser interface, but not the native "
              "pywebview workspace picker. Current release status is HOLD until "
              "`DESKTOP_WORKSPACE_PICKER_REVALIDATION.md` is completed.\n\n"
          )
          header = "# PaperClaw v0.17 Consolidated Release Acceptance Report\n\n"
          if notice not in report:
              report = report.replace(header, header + notice, 1)
          report_path.write_text(report, encoding="utf-8")

          original = "76ff6804827e02951edd4bae6496d86ebf239f51"
          for workflow_path in (
              ".github/workflows/desktop-playwright.yml",
              ".github/workflows/v017-context-memory.yml",
          ):
              Path(workflow_path).write_bytes(
                  subprocess.check_output(["git", "show", f"{original}:{workflow_path}"])
              )
          Path(".github/workflows/apply-native-workspace-picker-fix.yml").unlink(
              missing_ok=True
          )
          PY

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run focused regression
        run: |
          python -m pytest -q tests/unit/desktop/test_app.py
          python -m ruff check src/paperclaw/desktop/app.py tests/unit/desktop/test_app.py \
            --select E9,F63,F7,F82 --ignore F821

      - name: Commit verified fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(desktop): restore native workspace picker"
          git push origin HEAD:feat/v0.17-context-long-memory

  focused:
    name: context and memory focused tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run focused tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p tmp
          python -m pytest -q \
            --junitxml=tmp/context_memory_focused.xml \
            tests/unit/context/test_runtime_history_compaction.py \
            tests/unit/memory \
            tests/unit/service \
            tests/unit/desktop \
            tests/unit/test_tui_runner.py \
            2>&1 | tee tmp/context_memory_focused.log
      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-memory-focused-${{ github.run_id }}
          path: |
            tmp/context_memory_focused.xml
            tmp/context_memory_focused.log
          retention-days: 30
          if-no-files-found: warn

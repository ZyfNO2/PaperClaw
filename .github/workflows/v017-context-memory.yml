name: Context and long memory acceptance

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: context-memory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused:
    name: context and memory focused tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run focused tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p tmp
          python -m pytest -q \
            --junitxml=tmp/context_memory_focused.xml \
            tests/unit/context/test_runtime_history_compaction.py \
            tests/unit/memory \
            tests/unit/service \
            tests/unit/desktop \
            tests/unit/test_tui_runner.py \
            2>&1 | tee tmp/context_memory_focused.log
      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-memory-focused-${{ github.run_id }}
          path: |
            tmp/context_memory_focused.xml
            tmp/context_memory_focused.log
          retention-days: 30
          if-no-files-found: warn

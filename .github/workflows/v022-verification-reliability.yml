name: v0.22 Verification reliability

on:
  pull_request:
    branches: [main]
    paths:
      - "src/paperclaw/agent/**"
      - "src/paperclaw/multiagent/**"
      - "src/paperclaw/tasks/**"
      - "src/paperclaw/desktop/**"
      - "src/paperclaw/service/**"
      - "tests/unit/multiagent/**"
      - "tests/unit/tasks/**"
      - "tests/real_llm/test_v018_mistral_subagents.py"
      - ".github/workflows/v022-verification-reliability.yml"
      - "Plan/PaperClaw_v0.22_Verification_Reliability_Hardening.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verification-reliability:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install pytest-reportlog
      - name: Run v0.22 focused acceptance
        run: |
          mkdir -p tmp
          python -m pytest -q \
            tests/unit/multiagent/test_semantic_judge.py \
            tests/unit/multiagent/test_judge_factory.py \
            tests/unit/multiagent/test_verification_halt.py \
            tests/unit/multiagent/test_subagent_tool.py \
            tests/unit/multiagent/test_subagent_runtime_integration.py \
            tests/unit/tasks \
            --report-log=tmp/v022-verification-report.jsonl
      - name: Run Ruff
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check \
            --select E9,F63,F7,F82 \
            src/paperclaw/multiagent \
            src/paperclaw/tasks \
            src/paperclaw/desktop \
            tests/unit/multiagent \
            2>&1 | tee tmp/v022-ruff.log
      - name: Write acceptance summary
        if: always()
        run: |
          cat > tmp/v022-verification-summary.md <<'EOF'
          # v0.22 Verification Reliability acceptance

          This gate verifies deterministic Verify remains separate from semantic acceptance,
          non-proposal cancel/timeout/invalid-output halt routing, semantic rejection
          confirmation/disagreement behavior, typed Provider/protocol failures, bounded retry,
          separate judge-model composition, evidence-backed Worker completion contracts, and
          model-call budget accounting. It is deterministic automated evidence and is not a
          live Provider test. Ruff uses the repository correctness policy (E9/F63/F7/F82);
          unrelated style/dead-import cleanup is intentionally outside this release scope.
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v022-verification-reliability-${{ github.run_id }}
          path: |
            tmp/v022-verification-report.jsonl
            tmp/v022-verification-summary.md
            tmp/v022-ruff.log
          retention-days: 30
          if-no-files-found: warn

name: Apply final code review fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/consolidated-v0.11-v0.15' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/consolidated-v0.11-v0.15

      - name: Patch durable finalization and tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_between(text: str, start: str, end: str, replacement: str) -> str:
              left = text.index(start)
              right = text.index(end, left)
              return text[:left] + replacement + text[right:]

          store_path = Path('src/paperclaw/durability/service_store.py')
          store = store_path.read_text(encoding='utf-8')
          store = store.replace(
              'from .core import DurableRun, SQLiteDurableRunStore',
              '''from .core import (\n    ALLOWED_TRANSITIONS,\n    TERMINAL_STATES,\n    DurableRun,\n    DurableRunNotFoundError,\n    InvalidTransitionError,\n    LeaseConflictError,\n    SQLiteDurableRunStore,\n)''',
          )
          finalize_method = '''    def finalize_run(\n        self,\n        run_id: str,\n        *,\n        worker_id: str,\n        requested_state: str,\n        stop_reason: str,\n        metadata_patch: Mapping[str, Any],\n        event_type: str = "service.run.finalized",\n        event_payload: Mapping[str, Any] | None = None,\n    ) -> tuple[DurableRun, DurableRunEvent | None]:\n        """Atomically persist terminal metadata, state, lease release and event.\n\n        The worker lease is checked inside the same ``BEGIN IMMEDIATE``\n        transaction. A stale worker therefore cannot overwrite a run reclaimed\n        by another worker. Cancellation wins over a concurrently produced\n        runtime result; a run timeout is classified as ``failed`` while an\n        explicit user cancellation is classified as ``stopped``.\n        """\n\n        worker = worker_id.strip()\n        if not worker:\n            raise ValueError("worker_id must not be empty")\n        requested = requested_state.strip()\n        if requested not in TERMINAL_STATES:\n            raise ValueError("requested_state must be terminal")\n        reason = stop_reason.strip()\n        if not reason:\n            raise ValueError("stop_reason must not be empty")\n        normalized_event_type = event_type.strip()[:160]\n        if not normalized_event_type:\n            raise ValueError("event_type must not be empty")\n        patch = _sanitize(metadata_patch)\n        payload = _sanitize(event_payload or {})\n        if not isinstance(patch, dict) or not isinstance(payload, dict):\n            raise ValueError("metadata and event payload must be objects")\n\n        now = self._clock()\n        stored_event: DurableRunEvent | None = None\n        already_terminal = False\n        with self._transaction() as connection:\n            row = connection.execute(\n                "SELECT state, version, metadata_json FROM durable_runs "\n                "WHERE run_id = ?",\n                (run_id,),\n            ).fetchone()\n            if row is None:\n                raise DurableRunNotFoundError(f"unknown durable run: {run_id}")\n            current_state = str(row["state"])\n            if current_state in TERMINAL_STATES:\n                already_terminal = True\n            else:\n                lease = connection.execute(\n                    "SELECT worker_id, expires_at FROM durable_worker_leases "\n                    "WHERE run_id = ?",\n                    (run_id,),\n                ).fetchone()\n                if (\n                    lease is None\n                    or lease["worker_id"] != worker\n                    or float(lease["expires_at"]) <= now\n                ):\n                    raise LeaseConflictError(\n                        "worker does not own a live lease for finalization"\n                    )\n\n                metadata = json.loads(row["metadata_json"])\n                final_state = requested\n                final_reason = reason\n                if current_state == "cancelling":\n                    persisted_reason = metadata.get("stop_reason")\n                    if isinstance(persisted_reason, str) and persisted_reason.strip():\n                        final_reason = persisted_reason.strip()\n                    final_state = (\n                        "failed" if final_reason == "run_timeout" else "stopped"\n                    )\n                if final_state not in ALLOWED_TRANSITIONS.get(\n                    current_state, frozenset()\n                ):\n                    raise InvalidTransitionError(\n                        f"transition not allowed: {current_state} -> {final_state}"\n                    )\n\n                metadata.update(patch)\n                metadata["stop_reason"] = final_reason\n                if final_reason == "run_timeout":\n                    timeout_error = metadata.get("error")\n                    if not isinstance(timeout_error, dict) or (\n                        timeout_error.get("code") != "run_timeout"\n                    ):\n                        metadata["error"] = {\n                            "code": "run_timeout",\n                            "message": "run exceeded whole-run timeout",\n                        }\n\n                version = int(row["version"])\n                next_version = version + 1\n                connection.execute(\n                    "UPDATE durable_runs SET state = ?, version = ?, "\n                    "updated_at = ?, terminal_reason = ?, metadata_json = ? "\n                    "WHERE run_id = ?",\n                    (\n                        final_state,\n                        next_version,\n                        now,\n                        final_reason,\n                        json.dumps(\n                            metadata,\n                            sort_keys=True,\n                            separators=(",", ":"),\n                            ensure_ascii=False,\n                        ),\n                        run_id,\n                    ),\n                )\n                connection.execute(\n                    """\n                    INSERT INTO durable_run_transitions (\n                        run_id, from_state, to_state, version, reason, actor,\n                        timestamp, metadata_json\n                    ) VALUES (?, ?, ?, ?, ?, ?, ?, '{}')\n                    """,\n                    (\n                        run_id,\n                        current_state,\n                        final_state,\n                        next_version,\n                        final_reason,\n                        worker,\n                        now,\n                    ),\n                )\n\n                event_data = dict(payload)\n                event_data["status"] = final_state\n                event_data["stop_reason"] = final_reason\n                encoded = json.dumps(\n                    event_data,\n                    sort_keys=True,\n                    separators=(",", ":"),\n                    ensure_ascii=False,\n                )\n                sequence_row = connection.execute(\n                    "SELECT COALESCE(MAX(sequence), 0) + 1 AS next_sequence "\n                    "FROM durable_run_events WHERE run_id = ?",\n                    (run_id,),\n                ).fetchone()\n                sequence = int(sequence_row["next_sequence"])\n                connection.execute(\n                    """\n                    INSERT INTO durable_run_events (\n                        run_id, sequence, event_type, payload_json, terminal,\n                        timestamp\n                    ) VALUES (?, ?, ?, ?, 1, ?)\n                    """,\n                    (run_id, sequence, normalized_event_type, encoded, now),\n                )\n                connection.execute(\n                    "DELETE FROM durable_worker_leases WHERE run_id = ?",\n                    (run_id,),\n                )\n                stored_event = DurableRunEvent(\n                    run_id=run_id,\n                    sequence=sequence,\n                    event_type=normalized_event_type,\n                    payload=json.loads(encoded),\n                    terminal=True,\n                    timestamp=now,\n                )\n\n        run = self.get_run(run_id)\n        return run, None if already_terminal else stored_event\n\n'''
          marker = '    def queued_count(self) -> int:\n'
          if '    def finalize_run(' not in store:
              store = store.replace(marker, finalize_method + marker)
          store_path.write_text(store, encoding='utf-8')

          app_path = Path('src/paperclaw/service/durable_application.py')
          app = app_path.read_text(encoding='utf-8')
          app = app.replace(
              '    InvalidTransitionError,\n    RecoveryCoordinator,',
              '    InvalidTransitionError,\n    LeaseConflictError,\n    RecoveryCoordinator,',
          )
          app = app.replace(
              '        self._shutting_down = False\n',
              '        self._shutting_down = False\n        self._drainer_slots = 0\n',
              1,
          )

          cancel_function = '''    def cancel(\n        self,\n        service_run_id: str,\n        *,\n        reason: str = "user_requested",\n    ) -> PublicRunView:\n        normalized_reason = reason.strip()\n        if not normalized_reason:\n            raise ValueError("cancel reason must not be empty")\n        while True:\n            run = self._require(service_run_id)\n            if run.state in TERMINAL_SERVICE_STATUSES:\n                raise RunNotCancellableError("run is already terminal")\n            try:\n                if run.state == "queued":\n                    self._store.transition(\n                        run.run_id,\n                        expected_state="queued",\n                        expected_version=run.version,\n                        next_state="stopped",\n                        reason=normalized_reason,\n                        actor="service:cancel",\n                    )\n                    self._store.merge_metadata(\n                        run.run_id,\n                        {"stop_reason": normalized_reason},\n                    )\n                    self._append_event(\n                        run.run_id,\n                        "service.run.cancel_requested",\n                        {"reason": normalized_reason},\n                        terminal=False,\n                    )\n                    terminal_event = self._append_event(\n                        run.run_id,\n                        "service.run.stopped",\n                        {"reason": normalized_reason, "phase": "queued"},\n                        terminal=True,\n                    )\n                    self._plugins.event(terminal_event)\n                    view = self.get_run(run.run_id)\n                    self._plugins.run_terminal(view)\n                    return view\n                if run.state == "running":\n                    self._store.transition(\n                        run.run_id,\n                        expected_state="running",\n                        expected_version=run.version,\n                        next_state="cancelling",\n                        reason=normalized_reason,\n                        actor="service:cancel",\n                    )\n                    self._store.merge_metadata(\n                        run.run_id,\n                        {"stop_reason": normalized_reason},\n                    )\n                    self._append_event(\n                        run.run_id,\n                        "service.run.cancel_requested",\n                        {"reason": normalized_reason},\n                        terminal=False,\n                    )\n                    break\n                if run.state == "cancelling":\n                    persisted_reason = run.metadata.get("stop_reason")\n                    if isinstance(persisted_reason, str) and persisted_reason.strip():\n                        normalized_reason = persisted_reason.strip()\n                    break\n                raise RunNotCancellableError(\n                    f"run cannot be cancelled from state={run.state}"\n                )\n            except CompareAndSwapError:\n                continue\n        with self._lock:\n            active = self._active.get(service_run_id)\n            if active is not None:\n                active.cancel_requested = True\n                engine = active.engine\n                runtime_run_id = active.runtime_run_id\n            else:\n                engine = None\n                runtime_run_id = None\n        if engine is not None and runtime_run_id is not None:\n            try:\n                engine.request_stop(runtime_run_id, reason=normalized_reason)\n            except KeyError:\n                pass\n        return self.get_run(service_run_id)\n\n'''
          app = replace_between(app, '    def cancel(\n', '    def shutdown(', cancel_function)

          drainer_functions = '''    def _schedule_drainers(self) -> None:\n        with self._lock:\n            if self._shutting_down:\n                return\n            available = self._max_active_runs - self._drainer_slots\n            for _ in range(max(0, available)):\n                self._drainer_slots += 1\n                try:\n                    self._executor.submit(self._drain_queue)\n                except Exception:\n                    self._drainer_slots -= 1\n                    raise\n\n    def _drain_queue(self) -> None:\n        try:\n            while True:\n                with self._lock:\n                    if self._shutting_down:\n                        return\n                run = self._store.claim_next(\n                    self._worker_id,\n                    lease_seconds=self._lease_seconds,\n                )\n                if run is None:\n                    return\n                self._execute_claimed(run)\n        finally:\n            with self._lock:\n                self._drainer_slots = max(0, self._drainer_slots - 1)\n                should_reschedule = not self._shutting_down\n            if should_reschedule and self._store.queued_count() > 0:\n                self._schedule_drainers()\n\n'''
          app = replace_between(
              app,
              '    def _schedule_drainers(self) -> None:\n',
              '    def _execute_claimed(',
              drainer_functions,
          )

          execute_function = '''    def _execute_claimed(self, claimed: DurableRun) -> None:\n        if self._clock() - claimed.created_at > self._timeouts.queue_timeout_seconds:\n            self._fail_claimed(\n                claimed,\n                code="queue_timeout",\n                message="run exceeded queue timeout before execution",\n            )\n            return\n        try:\n            request = ServiceRunRequest.from_metadata(\n                _mapping(claimed.metadata.get("service_request"), "service_request")\n            )\n        except Exception as exc:\n            self._fail_claimed(\n                claimed,\n                code="invalid_durable_request",\n                message=f"{type(exc).__name__}: {exc}",\n            )\n            return\n\n        active = _ActiveExecution()\n        with self._lock:\n            self._active[claimed.run_id] = active\n        heartbeat = Thread(\n            target=self._heartbeat,\n            args=(claimed.run_id, active),\n            name=f"paperclaw-heartbeat-{claimed.run_id}",\n            daemon=True,\n        )\n        heartbeat.start()\n        timeout_thread = Thread(\n            target=self._run_timeout,\n            args=(claimed.run_id, active),\n            name=f"paperclaw-timeout-{claimed.run_id}",\n            daemon=True,\n        )\n        timeout_thread.start()\n\n        try:\n            engine = self._engine_factory(\n                request,\n                lambda event_type, payload: self._handle_runtime_event(\n                    claimed.run_id,\n                    event_type,\n                    payload,\n                ),\n            )\n            with self._lock:\n                active.engine = engine\n            result = engine.submit(request.task, limits=request.limits)\n            desired_state = result.status\n            stop_reason = result.stop_reason or result.status\n            error: dict[str, Any] | None = None\n            if desired_state not in TERMINAL_SERVICE_STATUSES:\n                desired_state = "failed"\n                stop_reason = "invalid_runtime_terminal_status"\n                error = {\n                    "code": "invalid_runtime_terminal_status",\n                    "message": f"runtime returned status={result.status!r}",\n                }\n            _, durable_event = self._store.finalize_run(\n                claimed.run_id,\n                worker_id=self._worker_id,\n                requested_state=desired_state,\n                stop_reason=str(stop_reason),\n                metadata_patch={\n                    "runtime_run_id": result.run_id,\n                    "model_calls": result.model_calls,\n                    "tool_calls": result.tool_calls,\n                    "output": result.output,\n                    "error": error,\n                },\n                event_type="service.run.finalized",\n                event_payload={\n                    "model_calls": result.model_calls,\n                    "tool_calls": result.tool_calls,\n                },\n            )\n            if durable_event is not None:\n                public_event = self._public_event(durable_event)\n                with self._event_condition:\n                    self._event_condition.notify_all()\n                self._plugins.event(public_event)\n        except LeaseConflictError:\n            # A newer worker owns the run after recovery. The stale worker must\n            # not alter state, metadata or public events.\n            pass\n        except Exception as exc:\n            failure = {\n                "code": "runtime_failed",\n                "error_type": type(exc).__name__,\n                "message": str(exc)[:500],\n            }\n            try:\n                _, durable_event = self._store.finalize_run(\n                    claimed.run_id,\n                    worker_id=self._worker_id,\n                    requested_state="failed",\n                    stop_reason="service_execution_failed",\n                    metadata_patch={"error": failure},\n                    event_type="service.run.failed",\n                    event_payload=failure,\n                )\n            except (LeaseConflictError, InvalidTransitionError):\n                durable_event = None\n            if durable_event is not None:\n                public_event = self._public_event(durable_event)\n                with self._event_condition:\n                    self._event_condition.notify_all()\n                self._plugins.event(public_event)\n        finally:\n            active.heartbeat_stop.set()\n            active.timeout_stop.set()\n            with self._lock:\n                self._active.pop(claimed.run_id, None)\n            try:\n                self._store.release_lease(claimed.run_id, self._worker_id)\n            except Exception:\n                pass\n            view = self.get_run(claimed.run_id)\n            if view.terminal:\n                self._plugins.run_terminal(view)\n\n'''
          app = replace_between(
              app,
              '    def _execute_claimed(',
              '    def _handle_runtime_event(',
              execute_function,
          )

          timeout_function = '''    def _run_timeout(self, run_id: str, active: _ActiveExecution) -> None:\n        if active.timeout_stop.wait(self._timeouts.run_timeout_seconds):\n            return\n        try:\n            self.cancel(run_id, reason="run_timeout")\n            self._store.merge_metadata(\n                run_id,\n                {\n                    "error": {\n                        "code": "run_timeout",\n                        "message": "run exceeded whole-run timeout",\n                        "seconds": self._timeouts.run_timeout_seconds,\n                    }\n                },\n            )\n        except (RunNotFoundError, RunNotCancellableError):\n            return\n\n'''
          app = replace_between(
              app,
              '    def _run_timeout(',
              '    def _fail_claimed(',
              timeout_function,
          )

          fail_function = '''    def _fail_claimed(self, run: DurableRun, *, code: str, message: str) -> None:\n        failure = {"code": code, "message": message[:500]}\n        try:\n            _, durable_event = self._store.finalize_run(\n                run.run_id,\n                worker_id=self._worker_id,\n                requested_state="failed",\n                stop_reason=code,\n                metadata_patch={"error": failure},\n                event_type="service.run.failed",\n                event_payload=failure,\n            )\n        except LeaseConflictError:\n            return\n        if durable_event is not None:\n            public_event = self._public_event(durable_event)\n            with self._event_condition:\n                self._event_condition.notify_all()\n            self._plugins.event(public_event)\n        view = self.get_run(run.run_id)\n        if view.terminal:\n            self._plugins.run_terminal(view)\n\n'''
          app = replace_between(
              app,
              '    def _fail_claimed(',
              '    def _append_event(',
              fail_function,
          )
          app_path.write_text(app, encoding='utf-8')

          Path('src/paperclaw/service/production_application.py').write_text(
              '''"""Public durable service implementation.\n\nCancellation race handling now lives in the base durable application service,\nso production and tests share one implementation.\n"""\n\nfrom .durable_application import DurableRunApplicationService\n\n__all__ = ["DurableRunApplicationService"]\n''',
              encoding='utf-8',
          )

          Path('tests/integration/service/test_durable_finalization_review.py').write_text(
              '''from __future__ import annotations\n\nfrom threading import Event\nimport time\n\nimport pytest\n\nfrom paperclaw.durability import (\n    LeaseConflictError,\n    RecoveryCoordinator,\n    SQLiteDurableServiceStore,\n)\nfrom paperclaw.harness import ExecutionReport, QueryEngine\nfrom paperclaw.service import DurableRunApplicationService, ServiceRunRequest\nfrom paperclaw.service.resilience import TimeoutPolicy\n\n\nclass ImmediateExecutor:\n    def execute(self, request, *, emit, stop_token):\n        return ExecutionReport(\n            status="completed",\n            output="done",\n            stop_reason="completed",\n            model_calls=1,\n            tool_calls=0,\n        )\n\n\nclass StopAwareExecutor:\n    def execute(self, request, *, emit, stop_token):\n        while not stop_token.is_cancelled:\n            time.sleep(0.005)\n        return ExecutionReport(\n            status="stopped",\n            output=None,\n            stop_reason=stop_token.reason or "cancelled",\n            model_calls=0,\n            tool_calls=0,\n        )\n\n\nclass BlockingFinalizeStore(SQLiteDurableServiceStore):\n    def __init__(self, path):\n        super().__init__(path)\n        self.finalize_entered = Event()\n        self.finalize_release = Event()\n\n    def finalize_run(self, *args, **kwargs):\n        if kwargs.get("event_type") == "service.run.finalized":\n            self.finalize_entered.set()\n            assert self.finalize_release.wait(3.0)\n        return super().finalize_run(*args, **kwargs)\n\n\ndef engine_factory(executor):\n    def create(request, event_handler):\n        return QueryEngine(\n            executor,\n            conversation_id="review-test",\n            event_handler=event_handler,\n        )\n\n    return create\n\n\ndef wait_terminal(service, run_id, timeout=5.0):\n    deadline = time.monotonic() + timeout\n    while time.monotonic() < deadline:\n        view = service.get_run(run_id)\n        if view.terminal:\n            return view\n        time.sleep(0.01)\n    raise AssertionError(f"run did not become terminal: {run_id}")\n\n\ndef test_cancel_racing_with_result_finalization_is_not_runtime_failure(tmp_path):\n    store = BlockingFinalizeStore(tmp_path / "cancel-finalize.sqlite3")\n    service = DurableRunApplicationService(\n        engine_factory(ImmediateExecutor()),\n        store,\n        max_active_runs=1,\n        lease_seconds=1.0,\n        heartbeat_seconds=0.1,\n    )\n    try:\n        run = service.submit(\n            ServiceRunRequest(task="race", workspace=str(tmp_path))\n        ).run\n        assert store.finalize_entered.wait(2.0)\n        cancelling = service.cancel(run.service_run_id, reason="user_cancel")\n        assert cancelling.status == "cancelling"\n        store.finalize_release.set()\n        terminal = wait_terminal(service, run.service_run_id)\n        assert terminal.status == "stopped"\n        assert terminal.stop_reason == "user_cancel"\n        assert terminal.error is None\n        finalized = [\n            event\n            for event in service.list_events(run.service_run_id)\n            if event.event_type == "service.run.finalized"\n        ]\n        assert finalized[-1].payload["status"] == "stopped"\n        assert not any(\n            event.event_type == "service.run.failed"\n            for event in service.list_events(run.service_run_id)\n        )\n    finally:\n        store.finalize_release.set()\n        service.shutdown()\n\n\ndef test_run_timeout_preserves_layer_specific_failure(tmp_path):\n    service = DurableRunApplicationService(\n        engine_factory(StopAwareExecutor()),\n        SQLiteDurableServiceStore(tmp_path / "run-timeout.sqlite3"),\n        max_active_runs=1,\n        lease_seconds=1.0,\n        heartbeat_seconds=0.1,\n        timeout_policy=TimeoutPolicy(run_timeout_seconds=0.05),\n    )\n    try:\n        run = service.submit(\n            ServiceRunRequest(task="timeout", workspace=str(tmp_path))\n        ).run\n        terminal = wait_terminal(service, run.service_run_id)\n        assert terminal.status == "failed"\n        assert terminal.stop_reason == "run_timeout"\n        assert terminal.error is not None\n        assert terminal.error["code"] == "run_timeout"\n    finally:\n        service.shutdown()\n\n\ndef test_stale_worker_cannot_finalize_reclaimed_run(tmp_path):\n    now = [100.0]\n    store = SQLiteDurableServiceStore(\n        tmp_path / "stale-worker.sqlite3", clock=lambda: now[0]\n    )\n    run, _ = store.create_run("svc-stale", "digest")\n    claimed = store.claim_next("worker-a", lease_seconds=1.0)\n    assert claimed is not None\n    now[0] = 102.0\n    reconciled = RecoveryCoordinator(store.run_store).reconcile()\n    assert reconciled[0].next_state == "queued"\n    claimed_again = store.claim_next("worker-b", lease_seconds=10.0)\n    assert claimed_again is not None\n\n    with pytest.raises(LeaseConflictError):\n        store.finalize_run(\n            run.run_id,\n            worker_id="worker-a",\n            requested_state="completed",\n            stop_reason="completed",\n            metadata_patch={"output": "stale"},\n        )\n    current = store.get_run(run.run_id)\n    assert current.state == "running"\n    assert current.metadata.get("output") != "stale"\n''',
              encoding='utf-8',
          )
          PY

      - name: Commit and push review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperclaw/durability/service_store.py \
                  src/paperclaw/service/durable_application.py \
                  src/paperclaw/service/production_application.py \
                  tests/integration/service/test_durable_finalization_review.py
          git rm .github/workflows/apply-final-code-review-fixes.yml
          git commit -m "fix(v0.15): make durable finalization atomic and race-safe"
          git push origin HEAD:feat/consolidated-v0.11-v0.15

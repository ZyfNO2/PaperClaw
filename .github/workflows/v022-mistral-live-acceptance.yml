name: v0.22 Live Mistral semantic acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - "src/paperclaw/multiagent/**"
      - "tests/real_llm/test_v018_mistral_subagents.py"
      - ".github/workflows/v022-mistral-live-acceptance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-mistral-semantic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PAPERCLAW_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERCLAW_BASE_URL: https://api.mistral.ai/v1
      PAPERCLAW_MODEL: mistral-small-latest
      PAPERCLAW_PROVIDER: mistral
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Require live Provider credential
        shell: bash
        run: |
          if [ -z "$PAPERCLAW_API_KEY" ]; then
            echo "::error::Repository secret MISTRAL_API_KEY is required for v0.22 live acceptance."
            exit 1
          fi
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Run live Mistral semantic acceptance
        run: |
          mkdir -p tmp
          python -m pytest -q \
            tests/real_llm/test_v018_mistral_subagents.py \
            -m real_llm \
            --report-log=tmp/v022-mistral-report.jsonl
      - name: Write evidence boundary
        if: always()
        shell: bash
        run: |
          cat > tmp/v022-mistral-summary.md <<'EOF'
          # v0.22 Live Mistral semantic acceptance

          This workflow calls the real Mistral Provider. The test uses separate execution
          and semantic-judge model instances, requires both read-only Workers to complete,
          requires semantic acceptance to pass for both task outputs, and records Provider
          overlap plus bounded judge metadata. It is distinct from deterministic Fake/Mock
          acceptance and from local LSP/Desktop process tests.
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v022-live-mistral-semantic-${{ github.run_id }}
          path: |
            tmp/v018-mistral-evidence.json
            tmp/v022-mistral-report.jsonl
            tmp/v022-mistral-summary.md
          retention-days: 30
          if-no-files-found: warn

name: v0.18 Live Mistral Subagent acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-mistral:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PAPERCLAW_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERCLAW_BASE_URL: https://api.mistral.ai/v1
      PAPERCLAW_MODEL: mistral-small-latest
      PAPERCLAW_PROVIDER: mistral
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Require live Provider credential
        shell: bash
        run: |
          if [ -z "$PAPERCLAW_API_KEY" ]; then
            echo "::error::Repository secret MISTRAL_API_KEY is required."
            exit 1
          fi
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Run live Mistral acceptance
        run: |
          mkdir -p tmp
          python -m pytest -q \
            tests/real_llm/test_v018_mistral_subagents.py \
            -m real_llm \
            --report-log=tmp/v018-mistral-report.jsonl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v018-live-mistral-${{ github.run_id }}
          path: |
            tmp/v018-mistral-evidence.json
            tmp/v018-mistral-report.jsonl
          retention-days: 30
          if-no-files-found: warn

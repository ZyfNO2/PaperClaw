name: v0.17 one-shot memory lock patch

on:
  push:
    branches: [feat/v0.17-context-long-memory]
    paths:
      - scripts/apply_v017_memory_lock_patch.py
      - .github/workflows/v017-memory-lock-self-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'apply memory locking') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v0.17-context-long-memory
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/apply_v017_memory_lock_patch.py
      - name: Commit patch
        run: |
          if git diff --quiet -- src/paperclaw/memory/store.py; then
            echo "Memory store already patched"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperclaw/memory/store.py
          git commit -m "fix(memory): apply memory locking and format guards"
          git push origin HEAD:feat/v0.17-context-long-memory

name: v0.24 Remote Worker Gateway

on:
  pull_request:
    branches:
      - feat/v0.23-executor-isolation
      - main
    paths:
      - "src/paperclaw/executor/**"
      - "src/paperclaw/service/worker_gateway_entrypoint.py"
      - "tests/unit/executor/**"
      - "tests/integration/test_worker_gateway_http_e2e.py"
      - "pyproject.toml"
      - ".github/workflows/v024-remote-worker-gateway.yml"
      - "Plan/PaperClaw_v0.24_Remote_Worker_Gateway.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway-focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run gateway unit acceptance
        run: python -m pytest -q tests/unit/executor/test_worker_gateway.py tests/unit/executor/test_worker_gateway_http.py
      - name: Run real local HTTP gateway roundtrip
        run: python -m pytest -q tests/integration/test_worker_gateway_http_e2e.py
      - name: Run v0.23 executor regression
        run: python -m pytest -q tests/unit/executor/test_subprocess_executor.py tests/unit/tasks/test_process_executor.py tests/unit/tasks/test_executor_mode.py
      - name: Run correctness lint
        run: python -m ruff check src/paperclaw/executor src/paperclaw/service/worker_gateway_entrypoint.py tests/unit/executor tests/integration/test_worker_gateway_http_e2e.py --select E9,F63,F7,F82

  full-windows-regression:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TEMP: ${{ github.workspace }}\tmp\pytest_temp
      TMP: ${{ github.workspace }}\tmp\pytest_temp
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Prepare temp dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tmp\pytest_temp | Out-Null
          New-Item -ItemType Directory -Force -Path tmp\pytest | Out-Null
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-reportlog
      - name: Run full non-live pytest regression
        shell: pwsh
        run: |
          python -m pytest `
            --basetemp=tmp/pytest `
            --report-log=tmp/v024-pytest-report.jsonl `
            -q `
            -m "not real_llm"
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v024-full-regression-${{ github.run_id }}
          path: tmp/v024-pytest-report.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run repository correctness lint
        run: python -m ruff check src/paperclaw tests --select E9,F63,F7,F82 --ignore F821

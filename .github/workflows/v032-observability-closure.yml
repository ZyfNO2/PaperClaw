name: v0.32 Observability Closure

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - name: Run closure tests
        run: >-
          python -m pytest
          tests/unit/multiagent/test_observed_runtime.py
          tests/unit/multiagent/test_bus_runtime.py
          tests/unit/eval/test_aggregate.py
          --junitxml=v032-${{ matrix.os }}.xml -vv
      - name: Verify capability truth source
        run: >-
          python -c "from paperclaw.capabilities import default_capability_catalog;
          catalog=default_capability_catalog();
          ids={item.capability_id for item in catalog.capabilities};
          assert 'multiagent.bus_choreography' in ids;
          assert 'evaluation.aggregate_dashboard' in ids;
          assert 'evaluation.team_trace_closure' in ids;
          print(len(ids))"
      - name: Correctness lint
        run: >-
          python -m ruff check
          src/paperclaw/multiagent/observed_runtime.py
          src/paperclaw/multiagent/bus_cli.py
          src/paperclaw/eval/cli.py
          src/paperclaw/capabilities/catalog.py
          src/paperclaw/capabilities/current.py
          tests/unit/multiagent/test_observed_runtime.py
          tests/real_llm/test_v032_trace_eval_live.py
          --select E9,F63,F7,F82
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v032-${{ matrix.os }}-${{ github.run_id }}
          path: v032-${{ matrix.os }}.xml

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "from importlib.metadata import version; assert version('paperclaw') == '0.32.0'"
      - run: paperclaw-team-run --help
      - run: paperclaw-observe --help

  live-provider:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PAPERCLAW_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERCLAW_BASE_URL: https://api.mistral.ai/v1
      PAPERCLAW_MODEL: mistral-small-latest
      PAPERCLAW_PROVIDER: mistral
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Require live provider credential
        shell: bash
        run: test -n "$PAPERCLAW_API_KEY"
      - run: python -m pip install -e ".[dev]"
      - name: Run live Team Run to Trace/Eval acceptance
        run: >-
          python -m pytest
          tests/real_llm/test_v032_trace_eval_live.py
          -m real_llm
          --junitxml=v032-live.xml
          -vv
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v032-live-${{ github.run_id }}
          path: v032-live.xml

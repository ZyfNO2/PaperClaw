name: Apply second code review fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/consolidated-v0.11-v0.15' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/consolidated-v0.11-v0.15

      - name: Patch cancellation, redaction and URL validation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_between(text: str, start: str, end: str, replacement: str) -> str:
              left = text.index(start)
              right = text.index(end, left)
              return text[:left] + replacement + text[right:]

          store_path = Path('src/paperclaw/durability/service_store.py')
          store = store_path.read_text(encoding='utf-8')
          cancel_method = '''    def request_cancellation(\n        self,\n        run_id: str,\n        *,\n        reason: str,\n        actor: str = "service:cancel",\n    ) -> tuple[DurableRun, tuple[DurableRunEvent, ...]]:\n        """Atomically persist cancellation state, reason and public events."""\n\n        normalized_reason = reason.strip()\n        normalized_actor = actor.strip()\n        if not normalized_reason:\n            raise ValueError("reason must not be empty")\n        if not normalized_actor:\n            raise ValueError("actor must not be empty")\n        now = self._clock()\n        stored_events: list[DurableRunEvent] = []\n\n        with self._transaction() as connection:\n            row = connection.execute(\n                "SELECT state, version, metadata_json FROM durable_runs "\n                "WHERE run_id = ?",\n                (run_id,),\n            ).fetchone()\n            if row is None:\n                raise DurableRunNotFoundError(f"unknown durable run: {run_id}")\n            current_state = str(row["state"])\n            if current_state in TERMINAL_STATES:\n                raise InvalidTransitionError(\n                    f"run cannot be cancelled from state={current_state}"\n                )\n            if current_state == "cancelling":\n                pass\n            elif current_state in {"queued", "running"}:\n                next_state = "stopped" if current_state == "queued" else "cancelling"\n                metadata = json.loads(row["metadata_json"])\n                metadata["stop_reason"] = normalized_reason\n                version = int(row["version"])\n                next_version = version + 1\n                terminal_reason = (\n                    normalized_reason if next_state in TERMINAL_STATES else None\n                )\n                connection.execute(\n                    "UPDATE durable_runs SET state = ?, version = ?, "\n                    "updated_at = ?, terminal_reason = ?, metadata_json = ? "\n                    "WHERE run_id = ?",\n                    (\n                        next_state,\n                        next_version,\n                        now,\n                        terminal_reason,\n                        json.dumps(\n                            metadata,\n                            sort_keys=True,\n                            separators=(",", ":"),\n                            ensure_ascii=False,\n                        ),\n                        run_id,\n                    ),\n                )\n                connection.execute(\n                    """\n                    INSERT INTO durable_run_transitions (\n                        run_id, from_state, to_state, version, reason, actor,\n                        timestamp, metadata_json\n                    ) VALUES (?, ?, ?, ?, ?, ?, ?, '{}')\n                    """,\n                    (\n                        run_id,\n                        current_state,\n                        next_state,\n                        next_version,\n                        normalized_reason,\n                        normalized_actor,\n                        now,\n                    ),\n                )\n\n                event_specs = [\n                    (\n                        "service.run.cancel_requested",\n                        {"reason": normalized_reason},\n                        False,\n                    )\n                ]\n                if next_state == "stopped":\n                    event_specs.append(\n                        (\n                            "service.run.stopped",\n                            {"reason": normalized_reason, "phase": "queued"},\n                            True,\n                        )\n                    )\n                sequence_row = connection.execute(\n                    "SELECT COALESCE(MAX(sequence), 0) AS sequence "\n                    "FROM durable_run_events WHERE run_id = ?",\n                    (run_id,),\n                ).fetchone()\n                sequence = int(sequence_row["sequence"])\n                for event_type, event_payload, terminal in event_specs:\n                    sequence += 1\n                    encoded = json.dumps(\n                        _sanitize(event_payload),\n                        sort_keys=True,\n                        separators=(",", ":"),\n                        ensure_ascii=False,\n                    )\n                    connection.execute(\n                        """\n                        INSERT INTO durable_run_events (\n                            run_id, sequence, event_type, payload_json, terminal,\n                            timestamp\n                        ) VALUES (?, ?, ?, ?, ?, ?)\n                        """,\n                        (\n                            run_id,\n                            sequence,\n                            event_type,\n                            encoded,\n                            1 if terminal else 0,\n                            now,\n                        ),\n                    )\n                    stored_events.append(\n                        DurableRunEvent(\n                            run_id=run_id,\n                            sequence=sequence,\n                            event_type=event_type,\n                            payload=json.loads(encoded),\n                            terminal=terminal,\n                            timestamp=now,\n                        )\n                    )\n                if next_state == "stopped":\n                    connection.execute(\n                        "DELETE FROM durable_worker_leases WHERE run_id = ?",\n                        (run_id,),\n                    )\n            else:\n                raise InvalidTransitionError(\n                    f"run cannot be cancelled from state={current_state}"\n                )\n\n        return self.get_run(run_id), tuple(stored_events)\n\n'''
          marker = '    def finalize_run(\n'
          if '    def request_cancellation(' not in store:
              store = store.replace(marker, cancel_method + marker)
          store = store.replace(
              '''            if any(\n                marker in normalized\n                for marker in (\n                    "api_key",\n                    "authorization",\n                    "password",\n                    "secret",\n                    "credential",\n                )\n            ):\n                continue\n''',
              '''            if (\n                any(\n                    marker in normalized\n                    for marker in (\n                        "api_key",\n                        "authorization",\n                        "password",\n                        "secret",\n                        "credential",\n                    )\n                )\n                or normalized.endswith("_token")\n                or normalized.startswith("token_")\n            ):\n                continue\n''',
          )
          store_path.write_text(store, encoding='utf-8')

          app_path = Path('src/paperclaw/service/durable_application.py')
          app = app_path.read_text(encoding='utf-8')
          cancel_function = '''    def cancel(\n        self,\n        service_run_id: str,\n        *,\n        reason: str = "user_requested",\n    ) -> PublicRunView:\n        normalized_reason = reason.strip()\n        if not normalized_reason:\n            raise ValueError("cancel reason must not be empty")\n        try:\n            run, durable_events = self._store.request_cancellation(\n                service_run_id,\n                reason=normalized_reason,\n            )\n        except DurableRunNotFoundError as exc:\n            raise RunNotFoundError(\n                f"unknown service run: {service_run_id}"\n            ) from exc\n        except InvalidTransitionError as exc:\n            raise RunNotCancellableError(str(exc)) from exc\n\n        for durable_event in durable_events:\n            public_event = self._public_event(durable_event)\n            with self._event_condition:\n                self._event_condition.notify_all()\n            self._plugins.event(public_event)\n\n        persisted_reason = run.metadata.get("stop_reason")\n        if isinstance(persisted_reason, str) and persisted_reason.strip():\n            normalized_reason = persisted_reason.strip()\n        view = self._view(run)\n        if view.terminal:\n            self._plugins.run_terminal(view)\n            return view\n\n        with self._lock:\n            active = self._active.get(service_run_id)\n            if active is not None:\n                active.cancel_requested = True\n                engine = active.engine\n                runtime_run_id = active.runtime_run_id\n            else:\n                engine = None\n                runtime_run_id = None\n        if engine is not None and runtime_run_id is not None:\n            try:\n                engine.request_stop(runtime_run_id, reason=normalized_reason)\n            except KeyError:\n                pass\n        return self.get_run(service_run_id)\n\n'''
          app = replace_between(app, '    def cancel(\n', '    def shutdown(', cancel_function)
          app_path.write_text(app, encoding='utf-8')

          contracts_path = Path('src/paperclaw/service/contracts.py')
          contracts = contracts_path.read_text(encoding='utf-8')
          contracts = contracts.replace(
              '''            if normalized in _SECRET_KEYS or any(\n                marker in normalized\n                for marker in ("password", "secret", "api_key", "authorization")\n            ):\n                continue\n''',
              '''            if (\n                normalized in _SECRET_KEYS\n                or any(\n                    marker in normalized\n                    for marker in (\n                        "password",\n                        "secret",\n                        "api_key",\n                        "authorization",\n                    )\n                )\n                or normalized.endswith("_token")\n                or normalized.startswith("token_")\n            ):\n                continue\n''',
          )
          contracts_path.write_text(contracts, encoding='utf-8')

          policy_path = Path('src/paperclaw/policy/tools.py')
          policy = policy_path.read_text(encoding='utf-8')
          policy = policy.replace(
              '''        host = (parsed.hostname or "").casefold()\n        if not host:\n            return "missing_url_host"\n        if host in {"localhost", "localhost.localdomain", "metadata.google.internal"}:\n            return "private_network_url"\n        try:\n            address = ipaddress.ip_address(host)\n        except ValueError:\n            continue\n''',
              '''        host = (parsed.hostname or "").casefold()\n        if not host:\n            return "missing_url_host"\n        if parsed.username or parsed.password:\n            return "url_credentials_not_allowed"\n        if (\n            host in {\n                "localhost",\n                "localhost.localdomain",\n                "metadata.google.internal",\n                "metadata.azure.internal",\n                "instance-data",\n            }\n            or host.endswith(".localhost")\n        ):\n            return "private_network_url"\n        try:\n            address = ipaddress.ip_address(host)\n        except ValueError:\n            labels = host.split(".")\n            if host.isdigit() or (\n                labels\n                and all(\n                    label.isdigit() or label.startswith("0x")\n                    for label in labels\n                )\n            ):\n                return "private_network_url"\n            continue\n''',
          )
          policy_path.write_text(policy, encoding='utf-8')

          review_test = Path('tests/integration/service/test_atomic_cancellation_review.py')
          review_test.write_text(
              '''from __future__ import annotations\n\nfrom paperclaw.durability import SQLiteDurableServiceStore\n\n\ndef test_queued_cancellation_persists_state_reason_and_events_atomically(tmp_path):\n    store = SQLiteDurableServiceStore(tmp_path / "queued-cancel.sqlite3")\n    store.create_run("svc-queued", "digest")\n\n    run, events = store.request_cancellation(\n        "svc-queued",\n        reason="user_requested",\n    )\n\n    assert run.state == "stopped"\n    assert run.metadata["stop_reason"] == "user_requested"\n    assert [event.event_type for event in events] == [\n        "service.run.cancel_requested",\n        "service.run.stopped",\n    ]\n    assert events[-1].terminal is True\n    assert store.list_events("svc-queued") == events\n\n\ndef test_running_cancellation_keeps_lease_for_cooperative_stop(tmp_path):\n    store = SQLiteDurableServiceStore(tmp_path / "running-cancel.sqlite3")\n    store.create_run("svc-running", "digest")\n    claimed = store.claim_next("worker-a", lease_seconds=30.0)\n    assert claimed is not None\n\n    run, events = store.request_cancellation(\n        "svc-running",\n        reason="user_requested",\n    )\n\n    assert run.state == "cancelling"\n    assert run.metadata["stop_reason"] == "user_requested"\n    assert [event.event_type for event in events] == [\n        "service.run.cancel_requested"\n    ]\n    renewed = store.renew_lease(\n        run.run_id,\n        "worker-a",\n        expected_run_version=run.version,\n        lease_seconds=30.0,\n    )\n    assert renewed > run.updated_at\n''',
              encoding='utf-8',
          )

          Path('tests/unit/service/test_redaction_review.py').write_text(
              '''from __future__ import annotations\n\nfrom paperclaw.durability import SQLiteDurableServiceStore\nfrom paperclaw.service.contracts import sanitize_public\n\n\ndef test_token_secrets_are_removed_without_dropping_token_counts(tmp_path):\n    payload = {\n        "access_token": "access-secret",\n        "refresh_token": "refresh-secret",\n        "token_value": "token-secret",\n        "input_tokens": 11,\n        "output_tokens": 7,\n    }\n    assert sanitize_public(payload) == {\n        "input_tokens": 11,\n        "output_tokens": 7,\n    }\n\n    store = SQLiteDurableServiceStore(tmp_path / "redaction.sqlite3")\n    store.create_run("svc-redaction", "digest")\n    event = store.append_event("svc-redaction", "model.completed", payload)\n    assert event.payload == {"input_tokens": 11, "output_tokens": 7}\n''',
              encoding='utf-8',
          )

          policy_test = Path('tests/unit/policy/test_tool_authorization.py')
          policy_tests = policy_test.read_text(encoding='utf-8')
          policy_tests += '''\n\ndef test_url_credentials_and_ambiguous_loopback_hosts_are_denied(tmp_path):\n    policy = DefaultToolAuthorizationPolicy()\n    cases = {\n        "http://user:pass@example.com/data": "url_credentials_not_allowed",\n        "http://api.localhost/data": "private_network_url",\n        "http://2130706433/data": "private_network_url",\n        "http://0x7f.0.0.1/data": "private_network_url",\n    }\n    for url, reason in cases.items():\n        decision = policy.authorize("http_fetch", {"url": url}, tmp_path)\n        assert decision.allowed is False\n        assert decision.reason == reason\n'''
          policy_test.write_text(policy_tests, encoding='utf-8')
          PY

      - name: Commit and push review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperclaw/durability/service_store.py \
                  src/paperclaw/service/durable_application.py \
                  src/paperclaw/service/contracts.py \
                  src/paperclaw/policy/tools.py \
                  tests/integration/service/test_atomic_cancellation_review.py \
                  tests/unit/service/test_redaction_review.py \
                  tests/unit/policy/test_tool_authorization.py
          git rm .github/workflows/apply-second-code-review-fixes.yml
          git commit -m "fix(v0.15): make cancellation atomic and harden redaction"
          git push origin HEAD:feat/consolidated-v0.11-v0.15

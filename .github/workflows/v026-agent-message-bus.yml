name: v0.26 Agent Message Bus

on:
  pull_request:
    branches:
      - feat/v0.25-distributed-store-queue
      - main
    paths:
      - "src/paperclaw/message_bus/**"
      - "tests/unit/message_bus/**"
      - ".github/workflows/v026-agent-message-bus.yml"
      - "Plan/PaperClaw_v0.26_Agent_Message_Bus_Foundation.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  message-bus-focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run message bus acceptance
        run: python -m pytest -q tests/unit/message_bus
      - name: Run v0.25 fencing regression
        run: python -m pytest -q tests/unit/tasks/test_fenced_store.py tests/unit/tasks/test_strict_fenced_store.py
      - name: Run correctness lint
        run: python -m ruff check src/paperclaw/message_bus tests/unit/message_bus --select E9,F63,F7,F82

  full-windows-regression:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TEMP: ${{ github.workspace }}\tmp\pytest_temp
      TMP: ${{ github.workspace }}\tmp\pytest_temp
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Prepare temp dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tmp\pytest_temp | Out-Null
          New-Item -ItemType Directory -Force -Path tmp\pytest | Out-Null
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-reportlog
      - name: Run full non-live pytest regression
        shell: pwsh
        run: |
          python -m pytest `
            --basetemp=tmp/pytest `
            --report-log=tmp/v026-pytest-report.jsonl `
            -q `
            -m "not real_llm"
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v026-full-regression-${{ github.run_id }}
          path: tmp/v026-pytest-report.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run repository correctness lint
        run: python -m ruff check src/paperclaw tests --select E9,F63,F7,F82 --ignore F821

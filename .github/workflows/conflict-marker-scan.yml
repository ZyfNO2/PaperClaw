name: Merge conflict marker scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked source and configuration files
        shell: bash
        run: |
          mkdir -p tmp
          set +e
          git grep -n -E '^(<<<<<<< |=======|>>>>>>> )' -- \
            ':(glob)src/**' \
            ':(glob)tests/**' \
            ':(glob).github/**' \
            pyproject.toml > tmp/conflict-markers.txt
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            cat tmp/conflict-markers.txt
            echo "::error::Unresolved merge conflict markers found."
            exit 1
          fi
          if [ "$status" -ne 1 ]; then
            echo "::error::git grep failed with status $status"
            exit "$status"
          fi
          echo "No unresolved merge conflict markers found."
      - name: Upload scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conflict-marker-scan-${{ github.run_id }}
          path: tmp/conflict-markers.txt
          retention-days: 30
          if-no-files-found: warn

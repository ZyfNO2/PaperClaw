name: v0.27 Forgotten Debt Product Foundation

on:
  pull_request:
    branches:
      - feat/v0.26-agent-message-bus
      - main
    paths:
      - "src/paperclaw/message_bus/**"
      - "src/paperclaw/capabilities/**"
      - "src/paperclaw/projects/**"
      - "src/paperclaw/memory/**"
      - "src/paperclaw/entrypoint.py"
      - "src/paperclaw/product_cli.py"
      - "tests/unit/message_bus/**"
      - "tests/unit/capabilities/**"
      - "tests/unit/projects/**"
      - "tests/unit/test_product_cli.py"
      - ".github/workflows/v027-forgotten-debt-product-foundation.yml"
      - "Plan/PaperClaw_v0.27_Forgotten_Debt_Product_Foundation.md"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-reportlog
          python -c "from pathlib import Path; Path('tmp').mkdir(exist_ok=True)"
      - name: Run v0.27 focused acceptance
        run: >-
          python -m pytest -q
          --report-log=tmp/v027-focused-${{ runner.os }}.jsonl
          tests/unit/message_bus
          tests/unit/capabilities
          tests/unit/projects
          tests/unit/test_product_cli.py
      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v027-focused-${{ runner.os }}-${{ github.run_id }}
          path: tmp/v027-focused-${{ runner.os }}.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run context and retrieval compatibility
        run: >-
          python -m pytest -q
          -k "memory or project_instruction or rag or retrieval"
          tests/unit
          tests/integration/test_v0_09_1_rag_demo.py
      - name: Run v0.25-v0.26 regression slices
        run: >-
          python -m pytest -q
          tests/unit/tasks/test_fenced_store.py
          tests/unit/tasks/test_strict_fenced_store.py
          tests/unit/executor/test_worker_gateway.py
      - name: Run correctness lint
        run: >-
          python -m ruff check
          src/paperclaw/message_bus
          src/paperclaw/capabilities
          src/paperclaw/projects
          src/paperclaw/memory/runtime.py
          src/paperclaw/product_cli.py
          src/paperclaw/entrypoint.py
          tests/unit/message_bus
          tests/unit/capabilities
          tests/unit/projects
          tests/unit/test_product_cli.py
          --select E9,F63,F7,F82

  full-windows-regression:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      TEMP: ${{ github.workspace }}\tmp\pytest_temp
      TMP: ${{ github.workspace }}\tmp\pytest_temp
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Prepare temp dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tmp\pytest_temp | Out-Null
          New-Item -ItemType Directory -Force -Path tmp\pytest | Out-Null
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-reportlog
      - name: Run full non-live pytest regression
        shell: pwsh
        run: |
          python -m pytest `
            --basetemp=tmp/pytest `
            --report-log=tmp/v027-pytest-report.jsonl `
            -q `
            -m "not real_llm"
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v027-full-regression-${{ github.run_id }}
          path: tmp/v027-pytest-report.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run repository correctness lint
        run: python -m ruff check src/paperclaw tests --select E9,F63,F7,F82 --ignore F821

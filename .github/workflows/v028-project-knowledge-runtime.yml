name: v0.28 Project Knowledge Runtime

on:
  pull_request:
    branches:
      - feat/v0.27-forgotten-debt-product-foundation
      - main
    paths:
      - "src/paperclaw/projects/**"
      - "src/paperclaw/retrieval/**"
      - "src/paperclaw/memory/**"
      - "src/paperclaw/product_cli.py"
      - "tests/unit/projects/**"
      - "tests/unit/retrieval/**"
      - "tests/unit/memory/**"
      - ".github/workflows/v028-project-knowledge-runtime.yml"
      - "Plan/PaperClaw_v0.28_Project_Knowledge_Runtime_Lifecycle.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run v0.28 focused acceptance
        run: >-
          python -m pytest -q
          tests/unit/projects/test_project_knowledge_runtime.py
          tests/unit/retrieval/test_hybrid_retriever.py
          tests/unit/memory/test_project_scoped_memory.py
          tests/unit/projects
          tests/unit/message_bus
          tests/unit/test_product_cli.py
      - name: Run context and retrieval compatibility
        run: >-
          python -m pytest -q
          -k "memory or project or retrieval or rag"
          tests/unit
          tests/integration/test_v0_09_1_rag_demo.py
      - name: Run correctness lint
        run: >-
          python -m ruff check
          src/paperclaw/projects
          src/paperclaw/retrieval
          src/paperclaw/memory
          src/paperclaw/product_cli.py
          tests/unit/projects
          tests/unit/retrieval
          tests/unit/memory
          --select E9,F63,F7,F82

  full-windows-regression:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      TEMP: ${{ github.workspace }}\tmp\pytest_temp
      TMP: ${{ github.workspace }}\tmp\pytest_temp
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Prepare temp dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tmp\pytest_temp | Out-Null
          New-Item -ItemType Directory -Force -Path tmp\pytest | Out-Null
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-reportlog
      - name: Run full non-live pytest regression
        shell: pwsh
        run: |
          python -m pytest `
            --basetemp=tmp/pytest `
            --report-log=tmp/v028-pytest-report.jsonl `
            -q `
            -m "not real_llm"
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v028-full-regression-${{ github.run_id }}
          path: tmp/v028-pytest-report.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run repository correctness lint
        run: python -m ruff check src/paperclaw tests --select E9,F63,F7,F82 --ignore F821

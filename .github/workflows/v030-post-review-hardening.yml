name: v0.30 Post-Review Hardening

on:
  pull_request:
    branches:
      - feat/v0.30-desktop-product-integration
      - main
    paths:
      - "src/paperclaw/storage_safety.py"
      - "src/paperclaw/artifacts/**"
      - "src/paperclaw/desktop/**"
      - "src/paperclaw/projects/**"
      - "src/paperclaw/retrieval/**"
      - "src/paperclaw/product_cli.py"
      - "tests/unit/artifacts/**"
      - "tests/unit/desktop/**"
      - "tests/unit/projects/**"
      - "tests/unit/retrieval/**"
      - "tests/unit/test_storage_safety.py"
      - ".github/workflows/v030-post-review-hardening.yml"
      - "Plan/PaperClaw_v0.30_Post_Review_Hardening.md"
      - "artifacts/v0_30_review/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -c "from pathlib import Path; Path('tmp').mkdir(exist_ok=True)"
      - name: Run reviewed boundary acceptance
        run: >-
          python -m pytest -q
          --report-log=tmp/v030-review-${{ runner.os }}.jsonl
          tests/unit/test_storage_safety.py
          tests/unit/artifacts
          tests/unit/desktop
          tests/unit/projects
          tests/unit/retrieval/test_hybrid_retriever.py
          tests/unit/retrieval/test_hybrid_post_review_hardening.py
          tests/unit/test_product_cli.py
      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v030-review-focused-${{ runner.os }}-${{ github.run_id }}
          path: tmp/v030-review-${{ runner.os }}.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run correctness lint
        run: >-
          python -m ruff check
          src/paperclaw/storage_safety.py
          src/paperclaw/artifacts
          src/paperclaw/desktop
          src/paperclaw/projects
          src/paperclaw/retrieval/hybrid.py
          src/paperclaw/product_cli.py
          tests/unit/test_storage_safety.py
          tests/unit/artifacts
          tests/unit/desktop
          tests/unit/projects
          tests/unit/retrieval/test_hybrid_retriever.py
          tests/unit/retrieval/test_hybrid_post_review_hardening.py
          --select E9,F63,F7,F82

  full-windows-regression:
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      TEMP: ${{ github.workspace }}\tmp\pytest_temp
      TMP: ${{ github.workspace }}\tmp\pytest_temp
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Prepare temp dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tmp\pytest_temp | Out-Null
          New-Item -ItemType Directory -Force -Path tmp\pytest | Out-Null
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-reportlog
      - name: Run full non-live regression
        shell: pwsh
        run: |
          python -m pytest `
            --basetemp=tmp/pytest `
            --report-log=tmp/v030-review-full.jsonl `
            -q `
            -m "not real_llm"
      - name: Upload full regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v030-review-full-${{ github.run_id }}
          path: tmp/v030-review-full.jsonl
          retention-days: 30
          if-no-files-found: warn
      - name: Run repository correctness lint
        run: python -m ruff check src/paperclaw tests --select E9,F63,F7,F82 --ignore F821

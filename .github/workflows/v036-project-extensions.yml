name: v0.36 Project Extensions

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feat/v0.36-project-skills-connectors'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - name: Run project extension tests
        run: >-
          python -m pytest
          tests/unit/projects/test_v036_extensions.py
          tests/unit/projects
          --junitxml=v036-${{ matrix.os }}.xml -vv
      - name: Correctness lint
        run: >-
          python -m ruff check
          src/paperclaw/projects/extensions.py
          src/paperclaw/projects/extension_runtime.py
          src/paperclaw/projects/extension_cli.py
          src/paperclaw/projects/__init__.py
          tests/unit/projects/test_v036_extensions.py
          --select E9,F63,F7,F82
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v036-focused-${{ matrix.os }}-${{ github.run_id }}
          path: v036-${{ matrix.os }}.xml

  package-smoke:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feat/v0.36-project-skills-connectors'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - name: Install wheel
        shell: bash
        run: |
          wheel=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          python -m pip install --force-reinstall "$wheel"
      - run: python -c "from importlib.metadata import version; assert version('paperclaw') == '0.36.0'"
      - run: paperclaw-project-extensions --help
      - run: paperclaw-retrieval-quality --help
      - run: paperclaw-team-run --help

  full-non-live:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feat/v0.36-project-skills-connectors'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - name: Full repository regression without external services
        run: >-
          python -m pytest
          -m "not real_llm and not distributed"
          --junitxml=v036-full.xml
          --report-log=v036-full.jsonl -q
      - name: Repository correctness lint
        run: python -m ruff check src/paperclaw tests --select E9,F63,F7,F82 --ignore F821
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v036-full-${{ github.run_id }}
          path: |
            v036-full.xml
            v036-full.jsonl
